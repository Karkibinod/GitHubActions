name : A basic workflow

on:
    push:
        branches: [ "main"]
    pull_request:
        branches: [ "main"]

    workflow_dispatch:

jobs:
    build-app:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v3
            - name: Run a one-line script
              run: echo "Hello world"
            - run: echo "Hello ubuntu"
            - name: Run a multi-line script
              run: |
                echo "Add other actions to build your project"
                echo "See the documentation for more ideas"
    build-db:
        needs: build-app
        runs-on: Windows-latest
        steps:
            - name: Run a one-line script
              run: echo "Hello windows"
    build-api:
        runs-on: Windows-latest
        steps:
            - name: Run a one-line script
              run: echo "Build API"
    package:
        needs: [build-app, build-db]
        runs-on: macOS-latest
        steps:
            - name: Run a one-line script
              run: echo "Hello macOS"





